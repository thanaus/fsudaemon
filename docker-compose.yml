services:
  postgres:
    image: postgres:18-alpine
    container_name: fsu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:?DB_NAME must be set in .env file}
      POSTGRES_USER: ${DB_USER:?DB_USER must be set in .env file}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env file}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    ports:
      - "${DB_PORT:?DB_PORT must be set in .env file}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - fsu-network

volumes:
  postgres_data:
    driver: local

networks:
  fsu-network:
    driver: bridge
    ipam:
      config:
        - subnet: 10.201.0.0/24
